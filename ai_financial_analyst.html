<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Analyst</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0e11;
    --surface: #14161c;
    --surface2: #1c1f28;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #ecedf0;
    --muted: #7a7f90;
    --accent: #4f6ef7;
    --accent-glow: rgba(79,110,247,0.18);
    --green: #2ec177;
    --red: #e85d5d;
    --amber: #f0a030;
    --font-display: 'DM Serif Display', serif;
    --font-sans: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  header h1 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 400;
    letter-spacing: -0.3px;
  }

  header span {
    font-size: 12px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border2);
    padding: 2px 10px;
    border-radius: 20px;
    margin-left: 4px;
  }

  .main {
    display: grid;
    grid-template-columns: 300px 1fr;
    flex: 1;
    min-height: 0;
  }

  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }

  .sidebar-section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .upload-zone {
    border: 1.5px dashed var(--border2);
    border-radius: 12px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-glow);
  }

  .upload-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .upload-icon { font-size: 28px; margin-bottom: 8px; }

  .upload-zone p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
  }

  .upload-zone strong { color: var(--text); font-weight: 500; }

  .file-badge {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    display: none;
  }

  .file-badge.visible { display: flex; }

  .file-badge .file-icon {
    width: 32px; height: 32px;
    background: rgba(79,110,247,0.15);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .file-badge .file-info { flex: 1; min-width: 0; }
  .file-badge .file-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-badge .file-size { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .remove-btn {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 16px; flex-shrink: 0;
    transition: color 0.2s;
  }
  .remove-btn:hover { color: var(--red); }

  .quick-questions label {
    font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); display: block; margin-bottom: 8px;
  }

  .quick-btn {
    display: block; width: 100%; text-align: left;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    font-size: 12.5px;
    color: var(--text);
    font-family: var(--font-sans);
    cursor: pointer;
    margin-bottom: 6px;
    transition: background 0.15s, border-color 0.15s;
    line-height: 1.4;
  }

  .quick-btn:hover {
    background: var(--accent-glow);
    border-color: rgba(79,110,247,0.35);
  }

  .data-preview {
    display: none;
    flex-direction: column;
    gap: 8px;
  }

  .data-preview.visible { display: flex; }

  .stat-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
  }

  .stat-chip .label { color: var(--muted); margin-bottom: 2px; }
  .stat-chip .val { font-weight: 500; font-family: var(--font-mono); font-size: 13px; }

  .chat-area {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 36px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    text-align: center;
    gap: 12px;
    padding: 40px;
  }

  .empty-state .big-icon { font-size: 48px; opacity: 0.4; }

  .empty-state h2 {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 400;
    color: var(--text);
    opacity: 0.6;
  }

  .empty-state p { font-size: 14px; max-width: 340px; line-height: 1.6; }

  .msg {
    display: flex;
    gap: 14px;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 600;
  }

  .avatar.ai { background: var(--accent); color: #fff; font-size: 13px; }
  .avatar.user { background: var(--surface2); border: 1px solid var(--border2); color: var(--muted); font-size: 13px; }

  .bubble {
    max-width: 72%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 13px 16px;
    font-size: 14px;
    line-height: 1.7;
  }

  .msg.user .bubble {
    background: var(--accent);
    border-color: transparent;
    color: #fff;
    border-radius: 14px 14px 2px 14px;
  }

  .msg.ai .bubble {
    border-radius: 2px 14px 14px 14px;
  }

  .bubble .thinking {
    display: flex;
    gap: 5px;
    align-items: center;
    color: var(--muted);
    font-size: 13px;
  }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blink 1.2s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  .insight-card {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-top: 10px;
    font-size: 13px;
  }

  .insight-card .insight-title {
    font-weight: 500;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
  }

  .tag {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
    margin: 2px 3px 2px 0;
  }

  .tag.green { background: rgba(46,193,119,0.12); color: var(--green); }
  .tag.red { background: rgba(232,93,93,0.12); color: var(--red); }
  .tag.amber { background: rgba(240,160,48,0.12); color: var(--amber); }
  .tag.blue { background: rgba(79,110,247,0.14); color: #7a97ff; }

  .input-bar {
    padding: 16px 28px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    display: flex;
    align-items: flex-end;
    padding: 10px 14px;
    gap: 8px;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: var(--accent); }

  #user-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: var(--font-sans);
    font-size: 14px; line-height: 1.5; resize: none;
    max-height: 120px; overflow-y: auto;
    padding: 0;
  }

  #user-input::placeholder { color: var(--muted); }

  #send-btn {
    width: 36px; height: 36px; border-radius: 9px;
    background: var(--accent);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s, transform 0.15s;
    flex-shrink: 0;
  }

  #send-btn:hover { opacity: 0.88; transform: scale(1.04); }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  #send-btn svg { width: 17px; height: 17px; fill: #fff; }

  .no-file-hint {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    padding-bottom: 4px;
  }

  pre {
    font-family: var(--font-mono);
    font-size: 12px;
    background: var(--bg);
    border-radius: 6px;
    padding: 10px 12px;
    overflow-x: auto;
    margin-top: 8px;
    white-space: pre-wrap;
    word-break: break-word;
    border: 1px solid var(--border);
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="logo-icon">📊</div>
  <h1>AI Analyst</h1>
  <span>Beta</span>
</header>

<div class="main">
  <aside class="sidebar">
    <div>
      <div class="sidebar-section-label">Data Source</div>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="file-input" accept=".csv,.txt,.json,.xlsx,.xls" />
        <div class="upload-icon">📁</div>
        <p><strong>Drop your file here</strong><br/>CSV, JSON, or TXT — up to 2MB</p>
      </div>
      <div class="file-badge" id="file-badge">
        <div class="file-icon">📄</div>
        <div class="file-info">
          <div class="file-name" id="file-name">—</div>
          <div class="file-size" id="file-size">—</div>
        </div>
        <button class="remove-btn" id="remove-btn" title="Remove file">✕</button>
      </div>
    </div>

    <div class="data-preview" id="data-preview">
      <div class="sidebar-section-label">File Preview</div>
      <div id="preview-chips"></div>
    </div>

    <div class="quick-questions">
      <label>Quick Questions</label>
      <button class="quick-btn" data-q="Revenue dropped suddenly — what could be the reason?">📉 Revenue dropped suddenly — why?</button>
      <button class="quick-btn" data-q="Revenue increased significantly — what drove this growth?">📈 Revenue spiked — what drove it?</button>
      <button class="quick-btn" data-q="Which product or category is underperforming and why?">⚠️ What's underperforming?</button>
      <button class="quick-btn" data-q="Summarize the overall financial health and key risks.">🏥 Overall financial health?</button>
      <button class="quick-btn" data-q="What are the top trends and anomalies in this data?">🔍 Top trends & anomalies?</button>
      <button class="quick-btn" data-q="Give me 3 actionable recommendations based on this data.">💡 Actionable recommendations?</button>
    </div>
  </aside>

  <section class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <div class="big-icon">🤖</div>
        <h2>Your AI Financial Analyst</h2>
        <p>Upload a company data file (CSV, JSON, TXT) and ask anything — revenue drops, anomalies, trends, risks, and recommendations.</p>
      </div>
    </div>

    <div class="input-bar">
      <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
        <div id="no-file-hint" class="no-file-hint">Upload a data file to unlock analysis</div>
        <div class="input-wrap">
          <textarea id="user-input" rows="1" placeholder="Ask about revenue, trends, anomalies..."></textarea>
        </div>
      </div>
      <button id="send-btn" disabled title="Send">
        <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </section>
</div>

<script>
const fileInput = document.getElementById('file-input');
const uploadZone = document.getElementById('upload-zone');
const fileBadge = document.getElementById('file-badge');
const fileNameEl = document.getElementById('file-name');
const fileSizeEl = document.getElementById('file-size');
const removeBtn = document.getElementById('remove-btn');
const messagesEl = document.getElementById('messages');
const emptyState = document.getElementById('empty-state');
const userInput = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const noFileHint = document.getElementById('no-file-hint');
const dataPreview = document.getElementById('data-preview');
const previewChips = document.getElementById('preview-chips');
const quickBtns = document.querySelectorAll('.quick-btn');

let fileContent = '';
let fileName = '';
let chatHistory = [];
let isLoading = false;

function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024*1024)).toFixed(1) + ' MB';
}

function extractPreviewStats(content, name) {
  const lines = content.split('\n').filter(l => l.trim());
  const chips = [];
  chips.push({ label: 'Total rows', val: (lines.length - 1) + '' });

  if (name.endsWith('.csv') || content.includes(',')) {
    const header = lines[0] || '';
    const cols = header.split(',').length;
    chips.push({ label: 'Columns', val: cols + '' });
    const headers = header.split(',').map(h => h.trim().replace(/"/g,''));
    chips.push({ label: 'Fields', val: headers.slice(0, 4).join(', ') + (headers.length > 4 ? '...' : '') });
  }

  const numMatches = content.match(/\d+[\.,]\d+/g) || [];
  if (numMatches.length > 0) {
    chips.push({ label: 'Numeric values found', val: numMatches.length + '' });
  }

  return chips;
}

function loadFile(file) {
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    alert('File is too large. Please use files under 2MB.');
    return;
  }

  const reader = new FileReader();
  reader.onload = (e) => {
    fileContent = e.target.result;
    fileName = file.name;

    uploadZone.style.display = 'none';
    fileBadge.classList.add('visible');
    fileNameEl.textContent = file.name;
    fileSizeEl.textContent = formatBytes(file.size);

    const stats = extractPreviewStats(fileContent, file.name);
    previewChips.innerHTML = stats.map(s => `
      <div class="stat-chip">
        <div class="label">${s.label}</div>
        <div class="val">${s.val}</div>
      </div>
    `).join('');
    dataPreview.classList.add('visible');

    sendBtn.disabled = false;
    noFileHint.style.display = 'none';
    userInput.placeholder = 'Ask anything about ' + file.name + '…';
  };
  reader.readAsText(file);
}

fileInput.addEventListener('change', (e) => { if (e.target.files[0]) loadFile(e.target.files[0]); });

uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault(); uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

removeBtn.addEventListener('click', () => {
  fileContent = ''; fileName = '';
  uploadZone.style.display = '';
  fileBadge.classList.remove('visible');
  dataPreview.classList.remove('visible');
  previewChips.innerHTML = '';
  sendBtn.disabled = true;
  noFileHint.style.display = '';
  userInput.placeholder = 'Ask about revenue, trends, anomalies...';
  fileInput.value = '';
});

quickBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    if (!fileContent) { alert('Please upload a data file first.'); return; }
    userInput.value = btn.dataset.q;
    sendMessage();
  });
});

userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!isLoading && fileContent) sendMessage();
  }
});

userInput.addEventListener('input', () => {
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
});

sendBtn.addEventListener('click', () => { if (!isLoading && fileContent) sendMessage(); });

function addMessage(role, content, isHTML) {
  emptyState.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + role;
  avatar.textContent = role === 'ai' ? 'AI' : 'You';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';

  if (isHTML) {
    bubble.innerHTML = content;
  } else {
    bubble.textContent = content;
  }

  div.appendChild(avatar);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubble;
}

function formatAIResponse(text) {
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code style="font-family:var(--font-mono);font-size:12px;background:rgba(255,255,255,0.06);padding:1px 5px;border-radius:4px;">$1</code>');

  const lines = html.split('\n');
  let result = '';
  let inList = false;

  for (let line of lines) {
    const trimmed = line.trim();
    if (trimmed.startsWith('- ') || trimmed.startsWith('• ')) {
      if (!inList) { result += '<ul style="padding-left:18px;margin:8px 0;">'; inList = true; }
      result += '<li style="margin:3px 0;">' + trimmed.slice(2) + '</li>';
    } else {
      if (inList) { result += '</ul>'; inList = false; }
      if (trimmed.startsWith('###')) {
        result += '<p style="font-weight:500;margin:12px 0 4px;color:var(--accent)">' + trimmed.slice(3).trim() + '</p>';
      } else if (trimmed.startsWith('##')) {
        result += '<p style="font-weight:600;margin:14px 0 6px;font-size:15px;">' + trimmed.slice(2).trim() + '</p>';
      } else if (trimmed === '') {
        result += '<br/>';
      } else {
        result += '<p style="margin:4px 0;">' + trimmed + '</p>';
      }
    }
  }
  if (inList) result += '</ul>';
  return result;
}

async function sendMessage() {
  const q = userInput.value.trim();
  if (!q || !fileContent || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;
  userInput.value = '';
  userInput.style.height = 'auto';

  addMessage('user', q, false);
  chatHistory.push({ role: 'user', content: q });

  const thinkBubble = addMessage('ai', '<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="margin-left:6px;font-size:12px;">Analysing your data…</span></div>', true);

  const truncated = fileContent.length > 12000 ? fileContent.slice(0, 12000) + '\n...[truncated for context]' : fileContent;

  const systemPrompt = `You are an expert financial and business analyst AI. The user has uploaded a company data file named "${fileName}". Here is the content:

<data>
${truncated}
</data>

Analyse this data thoroughly. When answering questions:
- Be specific and reference actual numbers from the data
- Identify trends, anomalies, seasonality, and correlations
- For revenue drops/spikes, suggest concrete business reasons (seasonality, market conditions, pricing changes, product issues, competition, operational problems, etc.)
- Use bullet points for clarity
- Always quantify when possible (e.g., "Revenue fell 23% in Q3")
- Suggest follow-up actions or deeper investigations when relevant
- Be direct, insightful, and business-savvy
- If data is insufficient for a conclusion, say so and explain what additional data would help`;

  const messages = [{ role: 'user', content: systemPrompt + '\n\nUser question: ' + chatHistory[chatHistory.length - 1].content }];
  if (chatHistory.length > 1) {
    const histSlice = chatHistory.slice(0, -1).slice(-6);
    messages.unshift(...histSlice.map(m => ({ role: m.role === 'ai' ? 'assistant' : 'user', content: m.content })));
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: chatHistory.slice(-8).map(m => ({
          role: m.role === 'ai' ? 'assistant' : 'user',
          content: m.content
        }))
      })
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error.message);

    const reply = data.content?.map(b => b.text || '').join('') || 'No response received.';
    chatHistory.push({ role: 'ai', content: reply });
    thinkBubble.innerHTML = formatAIResponse(reply);
    messagesEl.scrollTop = messagesEl.scrollHeight;

  } catch (err) {
    thinkBubble.innerHTML = `<span style="color:var(--red);">Error: ${err.message}</span>`;
  }

  isLoading = false;
  sendBtn.disabled = false;
  userInput.focus();
}
</script>
</body>
</html>
